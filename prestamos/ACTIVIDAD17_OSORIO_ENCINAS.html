<!DOCTYPE html>
<html>
<style>
form {
  border-radius: 5px;/*Redondea las esquinas*/
  background-color: #f2f2f2;/*Cambia el color de fondo de componente*/
  padding: 20px;/*Genera el area del componente*/
}

label {display: block;} /*bloquea la etiqueta*/

input[type=text], select {
  width: 100%; /*Establece el tamaño del componente para que tome todo el campo de la pantalla*/
  padding: 12px;
  margin: 8px 0;/*Establece los espacios de los lados*/
  display: inline-block;
  border: 1px solid #ccc; /*grosor del contorno y el color*/
  border-radius: 4px;
  box-sizing: border-box;
}

input[type=submit] {
  width: 100%;
  background-color: red;
  color: white;
  padding: 14px;
  margin: 8px 0;
  border: none;
  border-radius: 4px;
  cursor: pointer; /*cambia el cursor a manita*/
}

input[type=submit]:hover {
  background-color: #45a049;
}
</style>
<body>

<h2>Style an HTML Form with CSS</h2> <!- Titulo pequeño -->

<form action="/action_page.php">
  <label for="fname">First Name</label>  <!- Etiqueta -->
  <input type="text" id="fname" name="firstname" placeholder="Your name.."> <!- Caja de texto -->

  <label for="lname">Last Name</label>
  <input type="text" id="lname" name="lastname" placeholder="Your last name..">

  <label for="country">Country</label>
  <select id="country" name="country"> <!- Establece un comboboc -->
    <option value="australia">Australia</option><!- opciones del combobox -->
    <option value="canada">Canada</option>
    <option value="usa">USA</option>
  </select>
  
  <input type="submit" value="Submit"> 
</form>

</body>
</html>
